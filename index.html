// ---- DATE UTILS ----
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function getMondayOf(d) {
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const m = new Date(d); m.setDate(d.getDate() + diff); m.setHours(0,0,0,0);
  return m;
}
function addDays(d, n) { const r = new Date(d); r.setDate(d.getDate()+n); return r; }
function weekKey(monday) { return monday.toISOString().slice(0,10); }
function fmt(d) { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; }
function parseDate(s) {
  if (!s) return null;
  const p = s.split('/');
  if (p.length < 2) return null;
  const year = p.length >= 3 ? parseInt(p[2]) : 2025;
  const d = new Date(year, parseInt(p[1])-1, parseInt(p[0]));
  d.setHours(0,0,0,0); return d;
}
function getStatus(a) {
  if (a.done) return 'done';
  if (!a.date) return 'running';
  const d = parseDate(a.date);
  return d && d < TODAY ? 'late' : 'running';
}
function displayDate(s) {
  if (!s) return '';
  const p = s.split('/');
  return p.length >= 3 ? `${p[0]}/${p[1]}/${p[2].slice(2)}` : s;
}

let macroData, allWeeks;
let curArea='all', curFil='all', expanded={};
let curTab='macros';
let dayExpanded={0:true,1:true,2:true,3:true,4:true,5:true,6:true};
let viewMonday = getMondayOf(TODAY); // which week we're viewing

function currentWeekKey() { return weekKey(getMondayOf(TODAY)); }
function viewWeekKey()    { return weekKey(viewMonday); }

function getWeek(key) {
  if (!allWeeks[key]) allWeeks[key] = { days: [[],[],[],[],[],[],[]] };
  return allWeeks[key];
}

function save() {
  try {
    localStorage.setItem('macro2025v4', JSON.stringify(macroData));
    localStorage.setItem('weeks2025v4', JSON.stringify(allWeeks));
  } catch(e){}
}

function load() {
  try {
    const m = localStorage.getItem('macro2025v4');
    macroData = m ? JSON.parse(m) : JSON.parse(JSON.stringify(INIT_MACRO));
  } catch(e) { macroData = JSON.parse(JSON.stringify(INIT_MACRO)); }
  try {
    const w = localStorage.getItem('weeks2025v4');
    allWeeks = w ? JSON.parse(w) : {};
  } catch(e) { allWeeks = {}; }
}

// ---- NAVIGATION ----
function navWeek(dir) {
  viewMonday = addDays(viewMonday, dir * 7);
  renderWeek();
}

function weekLabel() {
  const vk = viewWeekKey();
  const ck = currentWeekKey();
  const nextMonday = addDays(getMondayOf(TODAY), 7);
  const nk = weekKey(nextMonday);
  if (vk === ck) return { label:'Semana Atual', cls:'badge-current' };
  if (vk === nk) return { label:'Próxima Semana', cls:'badge-future' };
  if (vk > ck)   return { label:'Semana Futura', cls:'badge-future' };
  return { label:'Semana Passada', cls:'badge-past' };
}

// ---- TRANSFER PENDING ----
function transferPending() {
  const vk = viewWeekKey();
  const week = getWeek(vk);
  const nextMonday = addDays(viewMonday, 7);
  const nk = weekKey(nextMonday);
  const nextWeek = getWeek(nk);

  let count = 0;
  week.days.forEach((dayActions, di) => {
    const pending = dayActions.filter(a => !a.done);
    pending.forEach(a => {
      nextWeek.days[di].push({ ...a, id: uid(), done: false });
      count++;
    });
    week.days[di] = dayActions.filter(a => a.done);
  });

  allWeeks[vk] = week;
  allWeeks[nk] = nextWeek;
  save();

  if (count > 0) {
    const nfmt = `${fmt(nextMonday)} — ${fmt(addDays(nextMonday,6))}`;
    alert(`${count} ação(ões) pendente(s) transferida(s) para a semana de ${nfmt}.`);
    renderWeek();
  } else {
    alert('Nenhuma ação pendente para transferir.');
  }
}

// ---- MACRO RENDER ----
function objStatus(obj) {
  if (!obj.actions.length) return 'running';
  const ss = obj.actions.map(a=>getStatus(a));
  if (ss.every(s=>s==='done')) return 'done';
  if (ss.some(s=>s==='late')) return 'late';
  return 'running';
}
function computeStats() {
  let t=0,d=0,l=0,r=0;
  ['pessoal','profissional'].forEach(ak=>macroData[ak].forEach(o=>o.actions.forEach(a=>{
    t++; const s=getStatus(a);
    if(s==='done')d++; else if(s==='late')l++; else r++;
  })));
  return {t,d,l,r};
}
function render() {
  save(); renderStats(); renderList();
  if(curTab==='semana') renderWeek();
}
function renderStats() {
  const {t,d,l,r}=computeStats(); const pct=t>0?Math.round(d/t*100):0;
  document.getElementById('stats').innerHTML=[
    [t,'Total','#a89bc8'],[d,'Concluídas','#22c55e'],[r,'Em execução','#f59e0b'],
    [l,'Atrasadas','#ef4444'],[pct+'%','Progresso','#a89bc8'],
  ].map(([v,lb,c])=>`<div class="sc"><div class="sv" style="color:${c}">${v}</div><div class="sl">${lb}</div></div>`).join('');
}

  if(curFil!=='all') objs=objs.filter(o=>objStatus(o)===curFil);
  if(!objs.length){el.innerHTML='<div class="empty">Nenhum objetivo encontrado.</div>';return;}
  el.innerHTML=objs.map(obj=>{
    const os=objStatus(obj),sc=SC[os];
    const total=obj.actions.length,doneC=obj.actions.filter(a=>getStatus(a)==='done').length;
    const pct=total>0?Math.round(doneC/total*100):0;
    const isOpen=!!expanded[obj.id],ak=obj.ak;

    if(isOpen){
      const rows=obj.actions.map(a=>{
        const as=getStatus(a),asc=SC[as];

          <div class="chk ${as==='done'?'chkd':''}" onclick="toggleDone('${ak}','${obj.id}','${a.id}')">${as==='done'?'✓':''}</div>
          <div class="ainfo">
            <div class="atxt ${as==='done'?'done':''}">${esc(a.text)}</div>
            ${a.note?`<div class="anote">📝 ${esc(a.note)}</div>`:''}
            <div class="ameta">
              ${a.date?`<span class="dbadge" style="color:${asc.color};background:${asc.bg};border:1px solid ${asc.color}33">${displayDate(a.date)}</span>`:''}
              <span class="sbadge" style="color:${asc.color}">${asc.icon} ${asc.label}</span>
            </div>
          </div>
          <div class="abtns">
            <button class="icon-btn" onclick="openEditAction('${ak}','${obj.id}','${a.id}')">✏️</button>
            <button class="icon-btn" onclick="confirmDelAction('${ak}','${obj.id}','${a.id}','${esc(a.text)}')">✕</button>

      }).join('');
      actsHtml=`<div class="acts-wrap">${rows}<div class="add-arow"><button class="add-abtn" onclick="openAddAction('${ak}','${obj.id}')">+ Adicionar ação</button></div></div>`;
    }
    return `<div class="obj-card ${isOpen?'open':''}" id="card-${obj.id}">
      <div class="obj-hdr" onclick="toggleExp('${obj.id}')">
        <div class="sdot" style="background:${sc.color};box-shadow:0 0 6px ${sc.color}66"></div>

          <div class="pbar"><div class="pfill" style="width:${pct}%;background:${sc.color}"></div></div>

          <button class="icon-btn" onclick="event.stopPropagation();openEditObj('${ak}','${obj.id}')">✏️</button>
          <button class="icon-btn" onclick="event.stopPropagation();confirmDelObj('${ak}','${obj.id}','${esc(obj.title)}')">🗑</button>
          <span class="chevron">${isOpen?'▲':'▼'}</span>
        </div>
      </div>${actsHtml}</div>`;

// ---- WEEKLY RENDER ----
function renderWeek() {
  const vk = viewWeekKey();
  const ck = currentWeekKey();
  const week = getWeek(vk);
  const sunday = addDays(viewMonday, 6);

  document.getElementById('wk-title').textContent = 'Semana';
  document.getElementById('wk-range').textContent = `${fmt(viewMonday)} — ${fmt(sunday)}`;
  const {label,cls} = weekLabel();
  document.getElementById('wk-badge').innerHTML = `<span class="week-badge ${cls}">${label}</span>`;

  let total=0,done=0;
  week.days.forEach(d=>d.forEach(a=>{total++;if(a.done)done++;}));
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('wk-pfill').style.width=pct+'%';
  document.getElementById('wk-stats').innerHTML=[
    [total,'Total','#a89bc8'],[done,'Concluídas','#22c55e'],[total-done,'Pendentes','#f59e0b']
  ].map(([v,lb,c])=>`<div class="sc"><div class="sv" style="color:${c}">${v}</div><div class="sl">${lb}</div></div>`).join('');

  // pending count for transfer bar
  const pendingCount = week.days.reduce((s,d)=>s+d.filter(a=>!a.done).length,0);

  const todayIdx = (() => { const d=TODAY.getDay(); return d===0?6:d-1; })();

  const daysHtml = DAYS.map((dayName,di)=>{
    const dayDate = addDays(viewMonday, di);
    const isToday = vk===ck && di===todayIdx;
    const actions = week.days[di]||[];
    const isOpen = dayExpanded[di]!==false;
    const doneC = actions.filter(a=>a.done).length;

    const actRows = isOpen ? actions.map(a=>{
      const pc = a.priority==='alta'?'pri-alta':a.priority==='media'?'pri-media':'pri-baixa';
      return `<div class="wact ${a.done?'done-card':''}">
        <div class="wchk ${a.done?'chkd':''}" onclick="toggleWeekDone('${vk}',${di},'${a.id}')">${a.done?'✓':''}</div>
        <div class="winfo">
          <div class="wtxt ${a.done?'done':''}">${esc(a.text)}</div>
          ${a.note?`<div class="wnote">📝 ${esc(a.note)}</div>`:''}
          <div class="wmeta">
            <span class="wpri ${pc}">${PRIOS[a.priority]||a.priority}</span>
            ${a.source?`<span class="wsrc">↗ ${esc(a.source)}</span>`:''}
          </div>
        </div>
        <div class="wabtns">
          <button class="icon-btn" onclick="openEditWeekAction('${vk}',${di},'${a.id}')">✏️</button>
          <button class="icon-btn" onclick="confirmDelWeekAction('${vk}',${di},'${a.id}','${esc(a.text)}')">✕</button>
        </div>
      </div>`;
    }).join('') : '';

    return `<div class="week-day">
      <div class="wday-hdr" onclick="toggleDay(${di})">
        <span class="wday-name" style="color:${isToday?'#c4b8e0':'#7c6fa0'}">${dayName}</span>
        <span class="wday-date">${fmt(dayDate)}${isToday?' ◀':''}</span>
        <span class="wday-count">${doneC}/${actions.length}</span>
        <div class="wday-line"></div>
        <span class="wday-chev">${isOpen?'▲':'▼'}</span>
      </div>
      ${isOpen?`<div>${actRows}
        <div class="wadd-row">
          <button class="wadd-btn" onclick="openAddWeekAction('${vk}',${di})">+ Ação livre</button>
          <button class="wadd-btn wadd-macro" onclick="openPickMacro('${vk}',${di})">+ Do macro</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('');

  const transferHtml = pendingCount > 0 ? `
    <div class="transfer-bar">
      <div class="transfer-info">📤 ${pendingCount} ação(ões) pendente(s) nesta semana</div>
      <button class="transfer-btn" onclick="transferPending()">Enviar pendentes → próxima semana</button>
    </div>` : '';

  document.getElementById('week-body').innerHTML = transferHtml + daysHtml;
}

function toggleDay(di){dayExpanded[di]=!dayExpanded[di];renderWeek();}
function toggleWeekDone(wk,di,id){
  const a=(getWeek(wk).days[di]||[]).find(a=>a.id===id);
  if(a)a.done=!a.done;
  save(); renderWeek();
}

function openEditAction(ak,objId,aId){
  const a=macroData[ak].find(o=>o.id===objId)?.actions.find(a=>a.id===aId); if(!a)return;
  openModal('Editar ação',aForm(a)+`<div class="mfoot"><button class="btn-c" onclick="closeModal()">Cancelar</button><button class="btn-ok" onclick="doEditAction('${ak}','${objId}','${aId}')">Salvar</button></div>`);
  setTimeout(()=>document.getElementById('i-tx')?.focus(),100);
}
function doEditAction(ak,objId,aId){
  const a=macroData[ak].find(o=>o.id===objId)?.actions.find(a=>a.id===aId); if(!a)return;
  a.text=(document.getElementById('i-tx')||{}).value?.trim()||a.text;
  a.date=(document.getElementById('i-dt')||{}).value?.trim()||null;
  a.note=(document.getElementById('i-nt')||{}).value?.trim()||'';
  closeModal(); render();
}
function confirmDelAction(ak,objId,aId,text){
  openModal('Confirmar exclusão',`<p class="mmsg">Excluir "<strong>${esc(text)}</strong>"?</p>
    <div class="mfoot"><button class="btn-c" onclick="closeModal()">Cancelar</button><button class="btn-del" onclick="doDelAction('${ak}','${objId}','${aId}')">Excluir</button></div>`);
}
function doDelAction(ak,objId,aId){
  const obj=macroData[ak].find(o=>o.id===objId); if(obj)obj.actions=obj.actions.filter(a=>a.id!==aId); closeModal(); render();
}

// ---- WEEKLY CRUD ----
function wForm(a){
  const ps=['alta','media','baixa'].map(p=>`<option value="${p}" ${a&&a.priority===p?'selected':''}>${PRIOS[p]}</option>`).join('');
  return `<label class="mlbl">Descrição</label><input class="minput" id="wi-tx" value="${esc(a?.text||'')}" placeholder="Ex: Reunião com equipe" />
    <label class="mlbl">Prioridade</label><select class="msel" id="wi-pr">${ps}</select>
    <label class="mlbl">Observação — opcional</label><textarea class="mta" id="wi-nt" placeholder="Detalhes...">${esc(a?.note||'')}</textarea>`;
}
function openAddWeekAction(wk,di){
  openModal(`Nova ação — ${DAYS[di]}`,wForm({priority:'media'})+
    `<div class="mfoot"><button class="btn-c" onclick="closeModal()">Cancelar</button><button class="btn-ok" onclick="doAddWeekAction('${wk}',${di})">Adicionar</button></div>`);
  setTimeout(()=>document.getElementById('wi-tx')?.focus(),100);
}
function doAddWeekAction(wk,di){
  const tx=(document.getElementById('wi-tx')||{}).value||''; if(!tx.trim())return;
  const week=getWeek(wk);
  week.days[di].push({id:uid(),text:tx.trim(),priority:(document.getElementById('wi-pr')||{}).value||'media',note:(document.getElementById('wi-nt')||{}).value?.trim()||'',done:false,source:null});
  closeModal(); save(); renderWeek();
}
function openEditWeekAction(wk,di,id){
  const a=(getWeek(wk).days[di]||[]).find(a=>a.id===id); if(!a)return;
  openModal('Editar ação',wForm(a)+
    `<div class="mfoot"><button class="btn-c" onclick="closeModal()">Cancelar</button><button class="btn-ok" onclick="doEditWeekAction('${wk}',${di},'${id}')">Salvar</button></div>`);
  setTimeout(()=>document.getElementById('wi-tx')?.focus(),100);
}
function doEditWeekAction(wk,di,id){
  const a=(getWeek(wk).days[di]||[]).find(a=>a.id===id); if(!a)return;
  a.text=(document.getElementById('wi-tx')||{}).value?.trim()||a.text;
  a.priority=(document.getElementById('wi-pr')||{}).value||'media';
  a.note=(document.getElementById('wi-nt')||{}).value?.trim()||'';
  closeModal(); save(); renderWeek();
}
function confirmDelWeekAction(wk,di,id,text){
  openModal('Confirmar exclusão',`<p class="mmsg">Excluir "<strong>${esc(text)}</strong>"?</p>
    <div class="mfoot"><button class="btn-c" onclick="closeModal()">Cancelar</button><button class="btn-del" onclick="doDelWeekAction('${wk}',${di},'${id}')">Excluir</button></div>`);
}
function doDelWeekAction(wk,di,id){
  const week=getWeek(wk); week.days[di]=(week.days[di]||[]).filter(a=>a.id!==id); closeModal(); save(); renderWeek();
}

// ---- PICK FROM MACRO ----
let pickWk, pickDi, selIds=new Set(), pickItems=[];

function openPickMacro(wk,di){
  pickWk=wk; pickDi=di; selIds=new Set(); pickItems=[];
  let items=[];
  ['pessoal','profissional'].forEach(ak=>{
    macroData[ak].forEach(obj=>{
      obj.actions.forEach(a=>{
        if(!a.done) items.push({id:a.id,text:a.text,source:`${obj.label} — ${obj.title}`});
      });
    });
  });
  pickItems=items;
  const listHtml=items.length===0
    ?'<p style="color:#6b6080;font-size:13px">Nenhuma ação macro disponível.</p>'
    :items.map(it=>`
      <div class="mpi" id="mpi-${it.id}" onclick="togglePick('${it.id}')">
        <div class="mpichk" id="mpichk-${it.id}"></div>
        <div><div class="mpisrc">${esc(it.source)}</div><div class="mpitxt">${esc(it.text)}</div></div>
      </div>`).join('');
  const ps=['alta','media','baixa'].map(p=>`<option value="${p}" ${p==='media'?'selected':''}>${PRIOS[p]}</option>`).join('');
  openModal(`Do macro — ${DAYS[di]}`,`
    <div class="mplist">${listHtml}</div>
    <label class="mlbl">Prioridade para as selecionadas</label>
    <select class="msel" id="pick-pr">${ps}</select>
    <div class="mfoot"><button class="btn-c" onclick="closeModal()">Cancelar</button><button class="btn-ok" onclick="doPickMacro()">Adicionar selecionadas</button></div>`);
}
function togglePick(id){
  const el=document.getElementById('mpi-'+id), chk=document.getElementById('mpichk-'+id);
  if(selIds.has(id)){selIds.delete(id);el.classList.remove('sel');chk.textContent='';}
  else{selIds.add(id);el.classList.add('sel');chk.textContent='✓';}
}
function doPickMacro(){
  const pri=(document.getElementById('pick-pr')||{}).value||'media';
  const week=getWeek(pickWk);
  selIds.forEach(id=>{
    const it=pickItems.find(i=>i.id===id); if(!it)return;
    week.days[pickDi].push({id:uid(),text:it.text,priority:pri,note:'',done:false,source:it.source});
  });
  closeModal(); save(); renderWeek();
}

load();
render();
